name: Build Android APK

on:
  push:
    branches:
      - claude/grayson-ledger-setup-MVyq4
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.Expo_Token }}

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Align Expo package versions
        working-directory: mobile
        run: npx expo install --fix

      - name: Build APK via EAS
        working-directory: mobile
        run: eas build --platform android --profile preview --non-interactive

      - name: Download APK from EAS
        working-directory: mobile
        run: |
          URL=$(eas build:list --platform android --limit 1 --json --non-interactive | jq -r '.[0].artifacts.buildUrl // .[0].artifacts.applicationArchiveUrl')
          echo "Downloading APK from: $URL"
          curl -L "$URL" -o /tmp/app.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: grayson-ledger-v${{ github.run_number }}
          path: /tmp/app.apk
          retention-days: 90
