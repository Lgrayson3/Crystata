name: Build Android APK

on:
  push:
    branches:
      - claude/grayson-ledger-setup-MVyq4
  workflow_dispatch: # allows manual trigger from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          # Caches ~/.gradle automatically — speeds up every build after the first
          cache: gradle

      - name: Write local.properties (Android SDK path)
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android_app/local.properties

      # Installs Gradle 8.4 without needing a committed gradlew wrapper binary
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Build debug APK
        working-directory: android_app
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: grayson-ledger-v${{ github.run_number }}
          path: android_app/app/build/outputs/apk/debug/app-debug.apk
          # Keep artifacts for 90 days so you can always grab a recent build
          retention-days: 90
