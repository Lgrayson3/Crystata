name: Build Android APK

on:
  push:
    branches:
      - claude/grayson-ledger-setup-MVyq4
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install Android SDK components and NDK
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25.2.9519653" \
            --sdk_root=$ANDROID_SDK_ROOT

      - name: Install JS dependencies
        working-directory: mobile
        run: npm install

      - name: Expo prebuild (generates Android folder)
        working-directory: mobile
        run: npx expo prebuild --platform android --no-install

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > mobile/android/local.properties
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> mobile/android/local.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('mobile/android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: grayson-ledger-v${{ github.run_number }}
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
